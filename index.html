<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin Fashion</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">


    <!-- Google font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <header class=" bg-[#FFFBF0] relative">

        <!-- Navbar -->
        <nav class="flex justify-between items-center container mx-auto py-4">
            <img src="./assets/icons/logo.png" alt="" class="w-[225px] h-[31px]">
            <ul class=" items-center gap-2 font-semibold hidden md:flex">
                <li>Home</li>
                <li>Product</li>
                <li>About us</li>
                <li>Contact Us</li>
            </ul>

            <span class="block md:hidden"><i class="fa-solid fa-bars"></i></span>
        </nav>

        <!-- Banner -->
        <section class="min-h-[75vh] flex justify-between items-center gap-4 container mx-auto">
            <div class="hidden md:block">
                <h2 class="text-[#FABE4C] text-[80px] md:leading-[75px] xl:leading-[35px]">Be the Penguins</h2>
                <h2 class="text-[#363958] text-[80px]">of Winter</h2>
                <p class="w-[350px]">Discover our latest collection of premium winter wear. Designed for comfort, durability, and a modern aesthetic that keeps you warm in style.</p>
                <button class="btn rounded-[10px] w-[170px] h-[60px] inline-block font-semibold mt-3.5"><i class="fa-solid fa-cart-arrow-down"></i>
                    BUY NOW</button>
            </div>

            <img src="./assets/images/model.png " alt="">
        </section>


        <!-- Png Img -->
        <img src="./assets/icons/banner_dot.png" alt="" class="absolute top-0 left-[50%]">
    </header>

    <main>

    </main>

    <footer>

    </footer>
</body>

</html>
